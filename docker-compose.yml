services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "SmrScheduler_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "SmrScheduler_2024!",
          "-Q", "SELECT 1",
          "-C"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: SmrScheduler.Api/Dockerfile
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: >-
        Server=sql-server,1433;Database=SmrSchedulerDb;
        User Id=sa;Password=SmrScheduler_2024!;
        TrustServerCertificate=True;MultipleActiveResultSets=true
    depends_on:
      sql-server:
        condition: service_healthy

  ui:
    build:
      context: ./smr-scheduler-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5050"
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sqldata:
